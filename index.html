<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cwyaxi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="photo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="music-prompt" id="music-prompt">
        <button class="music-btn" id="music-btn">☺☹☺</button>
    </div>

    <div class="border-bar">
        <div class="border-player">
            <img id="player-cover" src="photo.jpg" alt="cover" class="player-cover">
            <div class="player-info">
                <span class="player-title" id="player-title">music</span>
                <div class="player-progress-wrap">
                    <span class="player-time" id="player-current">0:00</span>
                    <input type="range" class="player-progress" id="player-progress" value="0" min="0" max="100" step="0.1">
                    <span class="player-time" id="player-duration">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="p-btn" id="btn-prev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="p-btn" id="btn-play"><i class="fa-solid fa-play" id="play-icon"></i></button>
                <button class="p-btn" id="btn-next"><i class="fa-solid fa-forward-step"></i></button>
                <button class="p-btn" id="btn-mute"><i class="fa-solid fa-volume-high" id="mute-icon"></i></button>
                <input type="range" class="volume-slider" id="volume-slider" value="100" min="0" max="100" step="1">
            </div>
        </div>
    </div>

    <audio id="player-audio"></audio>
    <div class="glitch-overlay"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>
    
    <div class="main-container">
        <div class="avatar-container">
            <div class="avatar glitch-avatar">
                <img class="avatar-inner" src="photo.jpg" alt="avatar">
            </div>
        </div>
        
        <div class="info">
            <h1 class="name glitch" data-text="cwyaxi">cwyaxi</h1>
        </div>
        


        <div class="social-links">
            <a href="https://ds.eronig.pro" target="_blank" class="social-btn">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://t.me/cwyaxi" target="_blank" class="social-btn">
                <i class="fa-brands fa-telegram"></i>
            </a>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
